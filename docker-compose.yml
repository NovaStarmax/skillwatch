services:
  postgres_warehouse:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: skillwatch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data

  postgres_demographics:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: demographics_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_demographics_data:/var/lib/postgresql/data

  spark:
    image: bitnami/spark:3.5
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"

  api:
    build:
      context: ./src/api
    ports:
      - "8000:8000"
    depends_on:
      - postgres_warehouse
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped

volumes:
  postgres_warehouse_data:
  postgres_demographics_data:
